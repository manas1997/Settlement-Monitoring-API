name: CI

on:
  push:
    branches: [ master, "YunoChallenge-*" ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Build & test
        run: ./gradlew clean build

      - name: Formatting report (non-blocking)
        if: always()
        run: ./gradlew spotlessCheck || echo "Run ./gradlew spotlessApply to fix formatting"

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/reports/tests/test

  docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t settlement-monitoring-api:${{ github.sha }} .
      # Push step intentionally omitted; wire up registry auth + push in your environment.
