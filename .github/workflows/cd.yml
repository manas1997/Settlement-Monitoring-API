name: CD

# Continuous delivery across three environments:
#   - review : per-PR ephemeral env (deployed on pull_request)
#   - dev    : integration env (deployed on push to main)
#   - prod   : production (deployed on a v* tag, behind a manual approval gate)
#
# Images are published to GHCR. Make the GHCR package PUBLIC so the deployed
# app's image is pullable without auth (challenge requirement: public access).
#
# Required secrets (set per GitHub Environment: review / dev / prod):
#   KUBE_CONFIG_B64  - base64-encoded kubeconfig for that environment's cluster
# GITHUB_TOKEN (built-in) is used to push images to GHCR.

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]
    tags: [ "v*" ]

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: settlement-monitoring-api

jobs:
  # ---------------------------------------------------------------------------
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase image ref + tag
        id: meta
        run: |
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          REPO="ghcr.io/${OWNER}/${IMAGE_NAME}"
          TAG="${GITHUB_SHA::12}"
          echo "repo=${REPO}"        >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}"          >> "$GITHUB_OUTPUT"
          echo "image=${REPO}:${TAG}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  deploy-review:
    if: github.event_name == 'pull_request'
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: review
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/kustomize-deploy
        with:
          overlay: review
          image: ${{ needs.build-and-push.outputs.image }}
          kubeconfig_b64: ${{ secrets.KUBE_CONFIG_B64 }}

  # ---------------------------------------------------------------------------
  deploy-dev:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/kustomize-deploy
        with:
          overlay: dev
          image: ${{ needs.build-and-push.outputs.image }}
          kubeconfig_b64: ${{ secrets.KUBE_CONFIG_B64 }}

  # ---------------------------------------------------------------------------
  deploy-prod:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: prod   # add required reviewers on this GitHub Environment to gate prod
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/kustomize-deploy
        with:
          overlay: prod
          image: ${{ needs.build-and-push.outputs.image }}
          kubeconfig_b64: ${{ secrets.KUBE_CONFIG_B64 }}
