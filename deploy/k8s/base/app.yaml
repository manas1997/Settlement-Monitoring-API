apiVersion: apps/v1
kind: Deployment
metadata:
  name: settlement-monitoring-api
  labels:
    app: settlement-monitoring-api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: settlement-monitoring-api
  template:
    metadata:
      labels:
        app: settlement-monitoring-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      # Block startup until Postgres accepts connections, so the app doesn't
      # crash-loop on a cold cluster.
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done"
      containers:
        - name: api
          # Overridden per-environment by kustomize `images:`.
          image: settlement-monitoring-api:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: settlement-config
            - secretRef:
                name: settlement-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: settlement-monitoring-api
  labels:
    app: settlement-monitoring-api
spec:
  type: ClusterIP
  selector:
    app: settlement-monitoring-api
  ports:
    - name: http
      port: 80
      targetPort: 8080
