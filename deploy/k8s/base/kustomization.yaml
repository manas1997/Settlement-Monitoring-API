apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Environment-agnostic base. Overlays set namespace, replicas, image tag,
# ingress host, and per-env config (seed flag, profile).
resources:
  - postgres.yaml
  - app-config.yaml
  - app.yaml
  - hpa.yaml
  - ingress.yaml

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: settlement-monitoring-api
      app.kubernetes.io/part-of: oceantrade-settlement
