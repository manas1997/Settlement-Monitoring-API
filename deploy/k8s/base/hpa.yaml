apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: settlement-monitoring-api
  labels:
    app: settlement-monitoring-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: settlement-monitoring-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
