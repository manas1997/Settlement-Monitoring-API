apiVersion: apps/v1
kind: Deployment
metadata:
  name: settlement-monitoring-api
  labels:
    app: settlement-monitoring-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: settlement-monitoring-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: settlement-monitoring-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: ghcr.io/oceantrade/settlement-monitoring-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod,secure"
            - name: DB_URL
              valueFrom:
                configMapKeyRef: { name: settlement-config, key: DB_URL }
            - name: OAUTH_ISSUER_URI
              valueFrom:
                configMapKeyRef: { name: settlement-config, key: OAUTH_ISSUER_URI }
            - name: DB_USER
              valueFrom:
                secretKeyRef: { name: settlement-secrets, key: DB_USER }
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef: { name: settlement-secrets, key: DB_PASSWORD }
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8080 }
            initialDelaySeconds: 40
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
