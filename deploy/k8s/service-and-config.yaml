apiVersion: v1
kind: Service
metadata:
  name: settlement-monitoring-api
  labels:
    app: settlement-monitoring-api
spec:
  type: ClusterIP
  selector:
    app: settlement-monitoring-api
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: settlement-config
data:
  DB_URL: "jdbc:postgresql://settlement-postgres:5432/settlement"
  OAUTH_ISSUER_URI: "https://auth.oceantrade.example.com/"
---
# NOTE: real secrets are injected by an external secrets manager
# (e.g. External Secrets Operator -> AWS Secrets Manager / Vault).
# This stub exists only so the manifests apply cleanly in a sandbox.
apiVersion: v1
kind: Secret
metadata:
  name: settlement-secrets
type: Opaque
stringData:
  DB_USER: "settlement"
  DB_PASSWORD: "change-me-via-secrets-manager"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: settlement-monitoring-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: settlement-monitoring-api
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
